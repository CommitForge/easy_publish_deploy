services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devdb}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-devdb}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data
    profiles: ["backend", "all"]

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BACKEND_SOURCE_DIR: ${TARGET_DIR:-./repos}/easy_publish_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_PORT: ${BACKEND_INTERNAL_PORT:-8081}
      SERVER_PORT: ${BACKEND_INTERNAL_PORT:-8081}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/devdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-dev}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-dev}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Djava.awt.headless=true}
      APP_IOTA_NETWORK: ${APP_IOTA_NETWORK:-mainnet}
      APP_IOTA_RPC_URLS: ${APP_IOTA_RPC_URLS:-}
      APP_IOTA_RPC_ATTEMPTS_PER_URL: ${APP_IOTA_RPC_ATTEMPTS_PER_URL:-2}
      APP_IOTA_RPC_RETRY_DELAY_MS: ${APP_IOTA_RPC_RETRY_DELAY_MS:-400}
      APP_IOTA_NODE_FETCH_MAX_ATTEMPTS: ${APP_IOTA_NODE_FETCH_MAX_ATTEMPTS:-3}
      APP_IOTA_NODE_FETCH_RETRY_DELAY_MS: ${APP_IOTA_NODE_FETCH_RETRY_DELAY_MS:-1000}
      APP_ONCHAIN_SYNC_ENABLED: ${APP_ONCHAIN_SYNC_ENABLED:-true}
      APP_ONCHAIN_SYNC_INITIAL_DELAY_MS: ${APP_ONCHAIN_SYNC_INITIAL_DELAY_MS:-15000}
      APP_ONCHAIN_SYNC_FIXED_DELAY_MS: ${APP_ONCHAIN_SYNC_FIXED_DELAY_MS:-60000}
      APP_ONCHAIN_SYNC_SMART_CONTRACT_ID: ${APP_ONCHAIN_SYNC_SMART_CONTRACT_ID:-0xb0927f142487c66708ec3cf978dbe45da94ccede7944de7a13889efa01f7dc67}
      APP_ONCHAIN_SYNC_CONTAINER_CHAIN_ID: ${CONTAINER_CHAIN_ID:-0xc225e0fc9f648d95e90e8b0bbb0aecf4122c90f7c8e9f137b64603685a796266}
      APP_ONCHAIN_SYNC_UPDATE_CHAIN_ID: ${UPDATE_CHAIN_ID:-0x6c5215f9827413e25fad5f746e01c50e523caf704d65d4c7db35ddd38a8de30b}
      APP_ONCHAIN_SYNC_DATA_ITEM_CHAIN_ID: ${DATA_ITEM_CHAIN_ID:-0x21e241879bc5dad7046d742e06f60ccd8e2b66b5609a48d8d25714e4253166f2}
      APP_ONCHAIN_SYNC_DATA_ITEM_VERIFICATION_CHAIN_ID: ${DATA_ITEM_VERIFICATION_CHAIN_ID:-0x1cfbe6f207b6f3851ac37d879a47f6a3262514d4b809c5f15cc971c62e2929b9}
      APP_EASY_PUBLISH_OFFCHAIN_INDEX_ENABLED: ${APP_EASY_PUBLISH_OFFCHAIN_INDEX_ENABLED:-false}
      APP_EASY_PUBLISH_OFFCHAIN_INDEX_MS: ${APP_EASY_PUBLISH_OFFCHAIN_INDEX_MS:-60000}
      APP_EASY_PUBLISH_OFFCHAIN_INDEX_INITIAL_DELAY_MS: ${APP_EASY_PUBLISH_OFFCHAIN_INDEX_INITIAL_DELAY_MS:-15000}
      SYNC_CHAIN_LAST: ${UPDATE_CHAIN_ID:-0x6c5215f9827413e25fad5f746e01c50e523caf704d65d4c7db35ddd38a8de30b}
      SYNC_CHAIN_DATAITEM: ${DATA_ITEM_CHAIN_ID:-0x21e241879bc5dad7046d742e06f60ccd8e2b66b5609a48d8d25714e4253166f2}
      SYNC_CHAIN_DATA_ITEM: ${DATA_ITEM_CHAIN_ID:-0x21e241879bc5dad7046d742e06f60ccd8e2b66b5609a48d8d25714e4253166f2}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8081}:${BACKEND_INTERNAL_PORT:-8081}"
    profiles: ["backend", "all"]

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        FRONTEND_SOURCE_DIR: ${TARGET_DIR:-./repos}/easy_publish_frontend
        CLI_SOURCE_REPO: ${CLI_SOURCE_REPO:-CommitForge/easy_publish_cli}
        CLI_SOURCE_REF: ${CLI_SOURCE_REF:-main}
        CLI_STRIP_VITE_COMPAT: ${CLI_STRIP_VITE_COMPAT:-true}
        VITE_PACKAGE_ID: ${VITE_PACKAGE_ID}
        VITE_MODULE_ID: ${VITE_MODULE_ID}
        VITE_CLOCK_ID: ${VITE_CLOCK_ID}
        VITE_CONTAINER_CHAIN_ID: ${VITE_CONTAINER_CHAIN_ID}
        VITE_DATA_ITEM_CHAIN_ID: ${VITE_DATA_ITEM_CHAIN_ID}
        VITE_DATA_ITEM_VERIFICATION_CHAIN_ID: ${VITE_DATA_ITEM_VERIFICATION_CHAIN_ID}
        VITE_UPDATE_CHAIN_ID: ${VITE_UPDATE_CHAIN_ID}
        VITE_IOTA_EXPLORER_OBJECT: ${VITE_IOTA_EXPLORER_OBJECT}
        VITE_IOTA_EXPLORER_NETWORK: ${VITE_IOTA_EXPLORER_NETWORK}
        VITE_IOTA_EXPLORER_TXBLOCK: ${VITE_IOTA_EXPLORER_TXBLOCK}
        VITE_PRIMARY_DOMAIN: ${VITE_PRIMARY_DOMAIN}
        VITE_APP_INSTANCE_NAME: ${VITE_APP_INSTANCE_NAME}
        VITE_APP_INSTANCE_DOMAIN: ${VITE_APP_INSTANCE_DOMAIN}
        VITE_API_BASE: ${VITE_API_BASE}
        VITE_API_WS_BASE: ${VITE_API_WS_BASE}
        VITE_API_BASE_PATH: ${VITE_API_BASE_PATH}
    restart: unless-stopped
    ports:
      - "${FRONTEND_NGINX_PORT:-8080}:80"
    profiles: ["frontend", "all"]

volumes:
  db_data:
